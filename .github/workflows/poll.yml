name: Poll Linear for new issues

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  poll:
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: ${{ vars.TARGET_REPO || 'nikhil-spike/spike-agent' }}
      LINEAR_TEAM_KEY: ${{ vars.LINEAR_TEAM_KEY }}
    steps:
      - name: Checkout hello-agent-tool
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone target repo
        run: |
          git clone "https://x-access-token:${TARGET_REPO_PAT}@github.com/${TARGET_REPO}.git" target-repo
          git -C target-repo config user.email "hello-agent@users.noreply.github.com"
          git -C target-repo config user.name "hello-agent"
        env:
          TARGET_REPO_PAT: ${{ secrets.TARGET_REPO_PAT }}

      - name: Poll Linear and open PRs
        run: node hello-agent.js --poll --limit 20 --repo "$GITHUB_WORKSPACE/target-repo"
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
